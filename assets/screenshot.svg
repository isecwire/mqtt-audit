<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="900" height="650" rx="10" ry="10" fill="#1a1b26"/>
  <rect width="900" height="38" rx="10" ry="10" fill="#24283b"/>
  <rect y="28" width="900" height="10" fill="#24283b"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <!-- Title bar text -->
  <text x="450" y="23" text-anchor="middle" fill="#787c99" font-size="12">mqtt-audit -- zsh -- 120x40</text>

  <!-- Terminal content -->
  <g transform="translate(18, 56)">
    <!-- Prompt + command -->
    <text y="0" fill="#7aa2f7" font-size="13" font-weight="bold">$</text>
    <text x="16" y="0" fill="#c0caf5" font-size="13"> mqtt-audit --host mqtt.factory-alpha.local --profile standard</text>

    <!-- Blank line -->

    <!-- Header -->
    <text y="30" fill="#bb9af7" font-size="13" font-weight="bold">mqtt-audit v1.0.0</text>
    <text x="130" y="30" fill="#565f89" font-size="13"> -- MQTT Broker Security Auditor</text>

    <!-- Blank line -->

    <!-- Target info -->
    <text y="56" fill="#565f89" font-size="13">Broker:</text>
    <text x="58" y="56" fill="#c0caf5" font-size="13"> mqtt.factory-alpha.local:1883</text>
    <text x="310" y="56" fill="#565f89" font-size="13">(MQTT v3.1.1)</text>

    <!-- Profile -->
    <text y="74" fill="#565f89" font-size="13">Profile:</text>
    <text x="65" y="74" fill="#7aa2f7" font-size="13"> standard</text>
    <text x="150" y="74" fill="#565f89" font-size="13">(12 checks)</text>

    <!-- Progress bar -->
    <text y="100" fill="#9ece6a" font-size="13">Running checks...</text>
    <text x="140" y="100" fill="#9ece6a" font-size="13"> ████████████████████</text>
    <text x="310" y="100" fill="#565f89" font-size="13"> 12/12</text>

    <!-- Blank line -->

    <!-- Table -->
    <text y="126" fill="#3b4261" font-size="12.5">┌──────────┬──────────────────────────────────────────┬───────┬──────────────────────┐</text>
    <text y="142" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="142" fill="#7aa2f7" font-size="12.5" font-weight="bold"> Severity </text>
    <text x="85" y="142" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="142" fill="#7aa2f7" font-size="12.5" font-weight="bold"> Finding                                  </text>
    <text x="427" y="142" fill="#3b4261" font-size="12.5">│</text>
    <text x="435" y="142" fill="#7aa2f7" font-size="12.5" font-weight="bold"> CVSS  </text>
    <text x="483" y="142" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="142" fill="#7aa2f7" font-size="12.5" font-weight="bold"> Compliance           </text>
    <text x="653" y="142" fill="#3b4261" font-size="12.5">│</text>
    <text y="158" fill="#3b4261" font-size="12.5">├──────────┼──────────────────────────────────────────┼───────┼──────────────────────┤</text>

    <!-- Row 1: CRITICAL -->
    <text y="174" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="174" fill="#f7768e" font-size="12.5" font-weight="bold"> CRITICAL </text>
    <text x="85" y="174" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="174" fill="#c0caf5" font-size="12.5"> Anonymous access allowed                  </text>
    <text x="427" y="174" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="174" fill="#f7768e" font-size="12.5" font-weight="bold"> 9.8  </text>
    <text x="483" y="174" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="174" fill="#c0caf5" font-size="12.5"> OWASP IoT #1, #3     </text>
    <text x="653" y="174" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 2: HIGH -->
    <text y="190" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="190" fill="#ff9e64" font-size="12.5" font-weight="bold"> HIGH     </text>
    <text x="85" y="190" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="190" fill="#c0caf5" font-size="12.5"> No TLS encryption available                </text>
    <text x="427" y="190" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="190" fill="#ff9e64" font-size="12.5"> 8.1  </text>
    <text x="483" y="190" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="190" fill="#c0caf5" font-size="12.5"> OWASP IoT #4         </text>
    <text x="653" y="190" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 3: HIGH -->
    <text y="206" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="206" fill="#ff9e64" font-size="12.5" font-weight="bold"> HIGH     </text>
    <text x="85" y="206" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="206" fill="#c0caf5" font-size="12.5"> Wildcard subscribe unrestricted             </text>
    <text x="427" y="206" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="206" fill="#ff9e64" font-size="12.5"> 7.5  </text>
    <text x="483" y="206" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="206" fill="#c0caf5" font-size="12.5"> OWASP IoT #3         </text>
    <text x="653" y="206" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 4: MEDIUM -->
    <text y="222" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="222" fill="#e0af68" font-size="12.5" font-weight="bold"> MEDIUM   </text>
    <text x="85" y="222" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="222" fill="#c0caf5" font-size="12.5"> Default credentials accepted (admin)       </text>
    <text x="427" y="222" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="222" fill="#e0af68" font-size="12.5"> 6.5  </text>
    <text x="483" y="222" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="222" fill="#c0caf5" font-size="12.5"> OWASP IoT #1         </text>
    <text x="653" y="222" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 5: MEDIUM -->
    <text y="238" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="238" fill="#e0af68" font-size="12.5" font-weight="bold"> MEDIUM   </text>
    <text x="85" y="238" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="238" fill="#c0caf5" font-size="12.5"> QoS 2 available (resource exhaustion)      </text>
    <text x="427" y="238" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="238" fill="#e0af68" font-size="12.5"> 5.3  </text>
    <text x="483" y="238" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="238" fill="#c0caf5" font-size="12.5"> IEC 62443 SR 7.1     </text>
    <text x="653" y="238" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 6: LOW -->
    <text y="254" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="254" fill="#7aa2f7" font-size="12.5"> LOW      </text>
    <text x="85" y="254" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="254" fill="#c0caf5" font-size="12.5"> $SYS tree exposes broker version           </text>
    <text x="427" y="254" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="254" fill="#7dcfff" font-size="12.5"> 3.1  </text>
    <text x="483" y="254" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="254" fill="#c0caf5" font-size="12.5"> OWASP IoT #6         </text>
    <text x="653" y="254" fill="#3b4261" font-size="12.5">│</text>

    <!-- Row 7: INFO -->
    <text y="270" fill="#3b4261" font-size="12.5">│</text>
    <text x="8" y="270" fill="#7dcfff" font-size="12.5"> INFO     </text>
    <text x="85" y="270" fill="#3b4261" font-size="12.5">│</text>
    <text x="93" y="270" fill="#c0caf5" font-size="12.5"> 23 topics discovered via wildcard          </text>
    <text x="427" y="270" fill="#3b4261" font-size="12.5">│</text>
    <text x="441" y="270" fill="#565f89" font-size="12.5"> 0.0  </text>
    <text x="483" y="270" fill="#3b4261" font-size="12.5">│</text>
    <text x="491" y="270" fill="#565f89" font-size="12.5"> --                    </text>
    <text x="653" y="270" fill="#3b4261" font-size="12.5">│</text>

    <!-- Table bottom -->
    <text y="286" fill="#3b4261" font-size="12.5">└──────────┴──────────────────────────────────────────┴───────┴──────────────────────┘</text>

    <!-- Blank line -->

    <!-- Executive summary box -->
    <rect x="0" y="302" width="654" height="56" rx="4" ry="4" fill="none" stroke="#ff9e64" stroke-width="1.5"/>
    <text x="200" y="318" fill="#ff9e64" font-size="12.5" font-weight="bold">Executive Summary (Risk: 8.4/10.0)</text>
    <text x="12" y="338" fill="#c0caf5" font-size="12">Overall Risk:</text>
    <text x="120" y="338" fill="#ff9e64" font-size="12" font-weight="bold"> HIGH</text>
    <text x="166" y="338" fill="#565f89" font-size="12"> -- 7 findings, 2 critical, 2 high, 2 medium, 1 low</text>

    <!-- Summary counts -->
    <text y="372" fill="#c0caf5" font-size="12" font-weight="bold">Total findings:</text>
    <text x="120" y="372" fill="#c0caf5" font-size="12"> 7  (</text>
    <text x="156" y="372" fill="#f7768e" font-size="12">critical: 1</text>
    <text x="244" y="372" fill="#c0caf5" font-size="12">, </text>
    <text x="258" y="372" fill="#ff9e64" font-size="12">high: 2</text>
    <text x="322" y="372" fill="#c0caf5" font-size="12">, </text>
    <text x="336" y="372" fill="#e0af68" font-size="12">medium: 2</text>
    <text x="416" y="372" fill="#c0caf5" font-size="12">, </text>
    <text x="430" y="372" fill="#7aa2f7" font-size="12">low: 1</text>
    <text x="490" y="372" fill="#c0caf5" font-size="12">, </text>
    <text x="504" y="372" fill="#7dcfff" font-size="12">info: 1</text>
    <text x="564" y="372" fill="#c0caf5" font-size="12">)</text>

    <!-- Blank line + prompt -->
    <text y="402" fill="#565f89" font-size="12">Report written to: report.json</text>
    <text y="424" fill="#7aa2f7" font-size="13" font-weight="bold">$</text>
    <rect x="16" y="414" width="8" height="16" fill="#c0caf5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>